<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Join as a Volunteer 🐾</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="adoption.html">Adoption</a>
    <a href="donation.html">Donation</a>
    <a href="rescue.html">Rescue</a>
    <a href="volunteer.html">Volunteer</a>
</nav>

<section class="form-section">
    <form id="volunteerForm"></form>

        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label for="location">City/State:</label>
            <input type="text" id="location" name="location" placeholder="Your location" required>
        </div>

        <div class="form-group">
            <label for="skills">How can you help?</label>
            <textarea id="skills" name="skills" placeholder="E.g., feeding, rescue, awareness campaigns" rows="4"></textarea>
        </div>

        <button type="submit">Join as Volunteer</button>
    </form>
</section>

<footer>
    <p>© 2026 Animal Safety</p>
</footer>

</body>
</html>
